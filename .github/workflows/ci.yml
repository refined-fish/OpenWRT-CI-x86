name: OpenWrt CI

on:
  workflow_dispatch:
    inputs:
      files_zip_url:
        description: 'files.zip 下载地址；可填单个 zip 或包含多个 zip 的目录；为空则使用 secrets.FILES_ZIP_URL；仍为空则跳过'
        required: false
        type: string
      clean_cache:
        description: '是否跳过已有缓存并重新编译'
        required: true
        default: false
        type: boolean

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      files_zip_url: ${{ inputs.files_zip_url }}
      clean_cache: ${{ inputs.clean_cache }}
    secrets: inherit
