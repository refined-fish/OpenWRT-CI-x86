name: OpenWrt CI

on:
  workflow_dispatch:
    inputs:
      files_zip_url:
        description: '一次性 files.zip 下载地址；为空则使用 secrets.FILES_ZIP_URL；仍为空则跳过'
        required: false
        type: string
      upload_webdav:
        description: '是否上传正式固件到 WebDAV'
        required: true
        default: true
        type: boolean
      clean_cache:
        description: '是否跳过已有缓存并重新编译'
        required: true
        default: false
        type: boolean

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      files_zip_url: ${{ inputs.files_zip_url }}
      upload_webdav: ${{ inputs.upload_webdav }}
      clean_cache: ${{ inputs.clean_cache }}
    secrets: inherit
