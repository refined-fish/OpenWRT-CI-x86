name: Reusable OpenWrt Build

on:
  workflow_call:
    inputs:
      files_zip_url:
        required: false
        type: string
      upload_webdav:
        required: true
        type: boolean
      clean_cache:
        required: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TZ: Asia/Shanghai
      WORKSPACE_DIR: ${{ github.workspace }}
      OPENWRT_DIR: ${{ github.workspace }}/openwrt
      FILES_ZIP_URL_INPUT: ${{ inputs.files_zip_url }}
      FILES_ZIP_URL_SECRET: ${{ secrets.FILES_ZIP_URL }}
      WEBDAV_URL: ${{ secrets.WEBDAV_URL }}
      WEBDAV_USERNAME: ${{ secrets.WEBDAV_USERNAME }}
      WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
      UPLOAD_WEBDAV: ${{ inputs.upload_webdav }}
      CLEAN_CACHE: ${{ inputs.clean_cache }}

    steps:
      - name: Checkout CI repository
        uses: actions/checkout@v4

      - name: Free disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          df -h

      - name: Install OpenWrt build dependencies
        shell: bash
        run: |
          sudo -E apt-get update
          sudo -E apt-get install -y dos2unix libfuse-dev python3 python3-pip python3-yaml ccache curl git jq qemu-utils unzip zip
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          python3 -m pip install --user pyyaml
          sudo -E timedatectl set-timezone "Asia/Shanghai"

      - name: Normalize scripts
        shell: bash
        run: |
          find scripts -type f -name '*.sh' -exec dos2unix {} \;
          find scripts -type f -name '*.sh' -exec chmod +x {} \;

      - name: Enable swap
        shell: bash
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Parse config.yaml
        shell: bash
        run: |
          python3 scripts/parse_config.py config.yaml "$GITHUB_ENV"

      - name: Clone OpenWrt source
        shell: bash
        run: |
          bash scripts/prepare_source.sh

      - name: Cache downloads
        if: env.CLEAN_CACHE != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.OPENWRT_DIR }}/dl
          key: openwrt-dl-${{ env.SOURCE_REPO_SLUG }}-${{ env.SOURCE_BRANCH }}-${{ env.TARGET_ARCH }}-${{ env.TARGET_SUBTARGET }}-${{ hashFiles('config.yaml', 'applist', 'config/.config') }}
          restore-keys: |
            openwrt-dl-${{ env.SOURCE_REPO_SLUG }}-${{ env.SOURCE_BRANCH }}-${{ env.TARGET_ARCH }}-${{ env.TARGET_SUBTARGET }}-
            openwrt-dl-${{ env.SOURCE_REPO_SLUG }}-${{ env.SOURCE_BRANCH }}-

      - name: Cache toolchain
        if: env.CLEAN_CACHE != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.OPENWRT_DIR }}/staging_dir/host*
            ${{ env.OPENWRT_DIR }}/staging_dir/tool*
          key: openwrt-toolchain-${{ env.SOURCE_REPO_SLUG }}-${{ env.SOURCE_BRANCH }}-${{ env.TARGET_ARCH }}-${{ env.TARGET_SUBTARGET }}-${{ hashFiles('config.yaml', 'applist', 'config/.config') }}
          restore-keys: |
            openwrt-toolchain-${{ env.SOURCE_REPO_SLUG }}-${{ env.SOURCE_BRANCH }}-${{ env.TARGET_ARCH }}-${{ env.TARGET_SUBTARGET }}-
            openwrt-toolchain-${{ env.SOURCE_REPO_SLUG }}-${{ env.SOURCE_BRANCH }}-

      - name: Refresh restored toolchain cache
        if: env.CLEAN_CACHE != 'true'
        shell: bash
        run: |
          if [ -d "$OPENWRT_DIR/staging_dir" ]; then
            find "$OPENWRT_DIR/staging_dir" -type d -name stamp -not -path '*/target-*' -print0 | while IFS= read -r -d '' dir; do
              find "$dir" -type f -exec touch {} +
            done
            mkdir -p "$OPENWRT_DIR/tmp"
            echo 1 > "$OPENWRT_DIR/tmp/.build"
            echo "Toolchain cache refreshed"
          else
            echo "No restored toolchain cache found"
          fi

      - name: Cache ccache
        if: env.CLEAN_CACHE != 'true' && env.USE_CCACHE == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENWRT_DIR }}/.ccache
          key: openwrt-ccache-${{ env.SOURCE_REPO_SLUG }}-${{ env.SOURCE_BRANCH }}-${{ env.TARGET_ARCH }}-${{ env.TARGET_SUBTARGET }}-${{ github.run_id }}
          restore-keys: |
            openwrt-ccache-${{ env.SOURCE_REPO_SLUG }}-${{ env.SOURCE_BRANCH }}-${{ env.TARGET_ARCH }}-${{ env.TARGET_SUBTARGET }}-

      - name: Prepare feeds
        shell: bash
        run: |
          bash scripts/prepare_feeds.sh

      - name: Prepare .config
        shell: bash
        run: |
          bash scripts/prepare_config.sh

      - name: Apply custom files
        shell: bash
        run: |
          bash scripts/apply_files.sh

      - name: Build OpenWrt
        shell: bash
        run: |
          bash scripts/build_openwrt.sh

      - name: Filter release firmware
        shell: bash
        run: |
          bash scripts/filter_firmware.sh

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.TARGET_ARCH }}-${{ env.TARGET_SUBTARGET }}-${{ env.TARGET_DEVICE }}-${{ github.run_number }}
          path: firmware-output/
          if-no-files-found: error
          retention-days: 14

      - name: Upload firmware to WebDAV
        if: env.UPLOAD_WEBDAV == 'true'
        id: upload_webdav
        continue-on-error: true
        shell: bash
        run: |
          bash scripts/upload_webdav.sh

      - name: Report WebDAV fallback
        if: env.UPLOAD_WEBDAV == 'true' && steps.upload_webdav.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "## WebDAV upload failed"
            echo
            echo "Firmware artifact has already been uploaded by GitHub Actions."
            echo "Use the artifact named openwrt-${TARGET_ARCH}-${TARGET_SUBTARGET}-${TARGET_DEVICE}-${GITHUB_RUN_NUMBER} as fallback."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::WebDAV upload failed; GitHub Actions artifact is available as fallback."
