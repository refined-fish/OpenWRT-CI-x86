source:
  repo: "https://github.com/immortalwrt/immortalwrt"
  branch: "openwrt-25.12"

target:
  arch: "x86"
  subtarget: "64"
  device: "generic"

feeds:
  - name: nikki
    url: https://github.com/nikkinikki-org/OpenWrt-nikki
    branch: main

build:
  language: zh-cn
  rootfs_size_mb: "512"
  grub_timeout: "3"
  use_ccache: true

upload:
  webdav_path: /openwrt
